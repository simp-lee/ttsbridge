providers:
  # Edge TTS (免费)
  edge:
    enabled: true
    priority: 1
    timeout: 30

  # Azure Cognitive Services TTS (收费)
  azure:
    enabled: false
    priority: 2
    timeout: 30
    config:
      api_key: "your-api-key-here"
      region: "eastus"
      endpoint: "https://<region>.api.cognitive.microsoft.com"

  # 阿里云 TTS (收费)
  aliyun:
    enabled: false
    priority: 3
    timeout: 30
    config:
      access_key_id: "your-access-key-id"
      access_key_secret: "your-access-key-secret"
      app_key: "your-app-key"

  # 腾讯云 TTS (收费)
  tencent:
    enabled: false
    priority: 4
    timeout: 30
    config:
      secret_id: "your-secret-id"
      secret_key: "your-secret-key"

# 默认提供商
default_provider: edge

# 备用提供商 (按顺序尝试)
fallback_providers:
  - edge
  - azure
  - aliyun

# 缓存配置
cache:
  enabled: true
  directory: "./cache"
  max_size_mb: 100
  ttl_hours: 24

# 默认语音参数
defaults:
  locale: "zh-CN"
  voice: "zh-CN-XiaoxiaoNeural"
  rate: 1.0
  volume: 1.0
  pitch: 1.0
  format: "mp3"
  sample_rate: 24000

# 日志配置
logging:
  level: "info"  # debug, info, warn, error
  format: "json" # json, text
  output: "stdout" # stdout, stderr, file path
